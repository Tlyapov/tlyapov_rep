<!doctype html>
{% load static %}

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'web_app/css/normalize.css' %}">
    <link rel="stylesheet" href="{% static 'web_app/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'web_app/css/navbar.css' %}">
    <title>Traffic Light CRM</title>
</head>
<div class="overlay"></div>
<body>
    <script src='{% static "./web_app/js/jquery.js" %}' type="text/javascript" language="JavaScript"></script>
    <script src='{% static "./web_app/js/jquery-ui.js" %}' type="text/javascript"
            language="JavaScript"></script>
    <div class="header-background"></div>
    {% include 'navbar.html' %}
<!--    <div class="container">-->

    {% if user.is_authenticated %}
    {% block content %}

    {% endblock %}
    {% else %}
    <div class="container">
        <div class="row">
            <div class="col-lg-6 col-sm-6">
                <h1 class="home_heading">Вход</h1>
                <div class="login_form">
                    <form method="POST" action="{% url 'clients' 1%}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" class="form-control" name="username" placeholder="Имя пользователя" required>
                        </div>
                        <br>
                        <div class="mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Пароль" required>
                        </div>
                        <br>
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    {% endif %}

<!--    </div>-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
{% block scripts %}

{% endblock %}
</body>
</html>
